name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    python:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v6
            - run: uv sync --frozen
            - name: Ruff format check
              run: uv run ruff format --check .
            - name: Ruff lint
              run: uv run ruff check .
            - name: Type check (ty)
              run: uv run ty check

    dashboard:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: dashboard/pnpm-lock.yaml
            - run: cd dashboard && pnpm install --frozen-lockfile
            - name: Lint (oxlint)
              run: cd dashboard && pnpm oxlint
            - name: Format check (oxfmt)
              run: cd dashboard && pnpm oxfmt --check .
            - name: Build
              run: cd dashboard && pnpm build
              env:
                  NEXT_PUBLIC_API_URL: https://getrich-api.rager.tech
